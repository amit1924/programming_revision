<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG - Tailwind Cheatsheet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { background: #0f0f1a; font-family: system-ui, sans-serif; }
    .info-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid #2a2a4a; border-radius: 16px; padding: 1.25rem; }
    .prop-tag { background: #2d2d44; border-radius: 6px; padding: 2px 10px; font-family: monospace; font-size: 0.8rem; color: #82aaff; display: inline-block; }
    .glow-card:hover { box-shadow: 0 0 25px rgba(99,102,241,0.3); transform: translateY(-2px); }
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #2d2d44; border-radius: 3px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #82aaff; border-radius: 50%; cursor: pointer; }
    input[type="color"] { -webkit-appearance: none; width: 40px; height: 40px; border: 2px solid #2a2a4a; border-radius: 8px; cursor: pointer; background: transparent; padding: 2px; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }
    select { background: #2d2d44; color: #e2e8f0; border: 1px solid #2a2a4a; border-radius: 8px; padding: 6px 12px; outline: none; cursor: pointer; }
    .svg-demo svg { max-width: 100%; height: auto; }
  </style>
</head>
<body class="min-h-screen text-gray-200 p-6">
  <div class="max-w-6xl mx-auto">
    <div class="mb-6 flex items-center gap-4">
      <a href="../index.html" class="text-gray-400 hover:text-white transition flex items-center gap-2"><i class="fas fa-arrow-left"></i> Back</a>
      <h1 class="text-3xl font-bold"><i class="fas fa-draw-polygon text-sky-400 mr-3"></i>SVG</h1>
    </div>

    <!-- Fill -->
    <div class="info-card mb-5">
      <div class="flex items-center gap-2 mb-4"><i class="fas fa-fill-drip text-sky-400"></i><h2 class="text-xl font-semibold">Fill</h2><span class="prop-tag">fill-{color} / fill-none</span></div>
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm text-gray-400 mb-2 block">Select Fill Color:</label>
          <div class="flex items-center gap-3 mb-3">
            <input type="color" id="fillColorPicker" value="#6366f1" oninput="updateFill(this.value)">
            <span id="fillColorVal" class="text-sm font-mono text-gray-300">#6366f1</span>
            <button onclick="setFillNone()" class="text-xs px-3 py-1 rounded bg-red-600/30 hover:bg-red-600/50 transition">fill-none</button>
          </div>
          <div class="flex flex-wrap gap-2 mb-2">
            <button onclick="setFill('#ef4444','red-500')" class="w-7 h-7 rounded-full bg-red-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setFill('#3b82f6','blue-500')" class="w-7 h-7 rounded-full bg-blue-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setFill('#22c55e','green-500')" class="w-7 h-7 rounded-full bg-green-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setFill('#eab308','yellow-500')" class="w-7 h-7 rounded-full bg-yellow-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setFill('#a855f7','purple-500')" class="w-7 h-7 rounded-full bg-purple-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setFill('#ec4899','pink-500')" class="w-7 h-7 rounded-full bg-pink-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setFill('#14b8a6','teal-500')" class="w-7 h-7 rounded-full bg-teal-500 border-2 border-transparent hover:border-white transition"></button>
          </div>
        </div>
        <div class="flex justify-center svg-demo">
          <svg width="220" height="160" viewBox="0 0 220 160">
            <circle id="fillCircle" cx="70" cy="80" r="50" fill="#6366f1" stroke="#2a2a4a" stroke-width="2"/>
            <rect id="fillRect" x="130" y="40" width="70" height="70" rx="10" fill="#6366f1" stroke="#2a2a4a" stroke-width="2"/>
            <path id="fillPath" d="M110 130 L130 100 L150 130 Z" fill="#6366f1" stroke="#2a2a4a" stroke-width="2"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Stroke -->
    <div class="info-card mb-5">
      <div class="flex items-center gap-2 mb-4"><i class="fas fa-pen-nib text-sky-400"></i><h2 class="text-xl font-semibold">Stroke</h2><span class="prop-tag">stroke-{color} / stroke-none</span></div>
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm text-gray-400 mb-2 block">Select Stroke Color:</label>
          <div class="flex items-center gap-3 mb-3">
            <input type="color" id="strokeColorPicker" value="#f472b6" oninput="updateStroke(this.value)">
            <span id="strokeColorVal" class="text-sm font-mono text-gray-300">#f472b6</span>
            <button onclick="setStrokeNone()" class="text-xs px-3 py-1 rounded bg-red-600/30 hover:bg-red-600/50 transition">stroke-none</button>
          </div>
          <div class="flex flex-wrap gap-2 mb-2">
            <button onclick="setStroke('#ef4444','red-500')" class="w-7 h-7 rounded-full bg-red-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setStroke('#3b82f6','blue-500')" class="w-7 h-7 rounded-full bg-blue-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setStroke('#22c55e','green-500')" class="w-7 h-7 rounded-full bg-green-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setStroke('#eab308','yellow-500')" class="w-7 h-7 rounded-full bg-yellow-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setStroke('#a855f7','purple-500')" class="w-7 h-7 rounded-full bg-purple-500 border-2 border-transparent hover:border-white transition"></button>
            <button onclick="setStroke('#ec4899','pink-500')" class="w-7 h-7 rounded-full bg-pink-500 border-2 border-transparent hover:border-white transition"></button>
          </div>
          <p class="text-xs text-gray-500 mt-2"><i class="fas fa-info-circle mr-1"></i>Stroke outlines the SVG shapes</p>
        </div>
        <div class="flex justify-center svg-demo">
          <svg width="220" height="160" viewBox="0 0 220 160">
            <circle id="strokeCircle" cx="70" cy="70" r="40" fill="none" stroke="#f472b6" stroke-width="4"/>
            <rect id="strokeRect" x="120" y="30" width="70" height="70" rx="8" fill="none" stroke="#f472b6" stroke-width="4"/>
            <path id="strokePath" d="M50 130 Q110 90 170 130" fill="none" stroke="#f472b6" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Stroke Width -->
    <div class="info-card mb-5">
      <div class="flex items-center gap-2 mb-4"><i class="fas fa-ruler text-sky-400"></i><h2 class="text-xl font-semibold">Stroke Width</h2><span class="prop-tag">stroke-{width}</span></div>
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm text-gray-400 mb-1 block">Stroke Width: <span id="swVal" class="text-white font-mono">stroke-2</span></label>
          <input type="range" id="swSlider" min="0" max="8" value="2" class="mb-2" oninput="updateStrokeWidth(this.value)">
          <div class="flex flex-wrap gap-2 mt-2">
            <button onclick="setSW(0)" class="text-xs px-2 py-1 rounded bg-indigo-600/30 hover:bg-indigo-600/50 transition">0</button>
            <button onclick="setSW(1)" class="text-xs px-2 py-1 rounded bg-indigo-600/30 hover:bg-indigo-600/50 transition">1</button>
            <button onclick="setSW(2)" class="text-xs px-2 py-1 rounded bg-indigo-600/30 hover:bg-indigo-600/50 transition">2</button>
            <button onclick="setSW(4)" class="text-xs px-2 py-1 rounded bg-indigo-600/30 hover:bg-indigo-600/50 transition">4</button>
            <button onclick="setSW(8)" class="text-xs px-2 py-1 rounded bg-indigo-600/30 hover:bg-indigo-600/50 transition">8</button>
          </div>
        </div>
        <div class="flex justify-center svg-demo">
          <svg width="300" height="160" viewBox="0 0 300 160">
            <line id="swLine1" x1="20" y1="30" x2="280" y2="30" stroke="#82aaff" stroke-width="1" stroke-linecap="round"/>
            <line id="swLine2" x1="20" y1="65" x2="280" y2="65" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
            <line id="swLine3" x1="20" y1="100" x2="280" y2="100" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>
            <line id="swLine4" x1="20" y1="135" x2="280" y2="135" stroke="#f472b6" stroke-width="8" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="text-center text-gray-500 text-sm mt-6"><a href="../index.html" class="hover:text-gray-300 transition"><i class="fas fa-arrow-left mr-1"></i>Back to Cheatsheet</a></div>
  </div>

  <script>
    function updateFill(hex) {
      document.getElementById('fillColorVal').textContent = hex;
      document.getElementById('fillCircle').setAttribute('fill', hex);
      document.getElementById('fillRect').setAttribute('fill', hex);
      document.getElementById('fillPath').setAttribute('fill', hex);
    }
    function setFill(hex, name) {
      document.getElementById('fillColorPicker').value = hex;
      updateFill(hex);
    }
    function setFillNone() {
      document.getElementById('fillColorVal').textContent = 'none';
      document.getElementById('fillCircle').setAttribute('fill', 'none');
      document.getElementById('fillRect').setAttribute('fill', 'none');
      document.getElementById('fillPath').setAttribute('fill', 'none');
    }

    function updateStroke(hex) {
      document.getElementById('strokeColorVal').textContent = hex;
      document.getElementById('strokeCircle').setAttribute('stroke', hex);
      document.getElementById('strokeRect').setAttribute('stroke', hex);
      document.getElementById('strokePath').setAttribute('stroke', hex);
    }
    function setStroke(hex, name) {
      document.getElementById('strokeColorPicker').value = hex;
      updateStroke(hex);
    }
    function setStrokeNone() {
      document.getElementById('strokeColorVal').textContent = 'none';
      document.getElementById('strokeCircle').setAttribute('stroke', 'none');
      document.getElementById('strokeRect').setAttribute('stroke', 'none');
      document.getElementById('strokePath').setAttribute('stroke', 'none');
    }

    function updateStrokeWidth(v) {
      const i = parseInt(v);
      document.getElementById('swVal').textContent = 'stroke-' + i;
      document.getElementById('swLine1').setAttribute('stroke-width', Math.max(1, i));
      document.getElementById('swLine2').setAttribute('stroke-width', Math.max(1, i));
      document.getElementById('swLine3').setAttribute('stroke-width', Math.max(1, i));
      document.getElementById('swLine4').setAttribute('stroke-width', Math.max(1, i));
    }
    function setSW(v) { document.getElementById('swSlider').value = v; updateStrokeWidth(v); }
  </script>
</body>
</html>
