    body { background: #0f0f1a; font-family: system-ui, sans-serif; }

    .info-card:hover { box-shadow: 0 0 20px rgba(99,102,241,0.15); transform: translateY(-2px); }
    .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .glow-card:hover { box-shadow: 0 0 25px rgba(99,102,241,0.3); transform: translateY(-4px); }
    .tag { background: #2d2d44; border-radius: 6px; padding: 2px 10px; font-family: monospace; font-size: 0.75rem; color: #ffd700; display: inline-block; }
    .demo-btn { transition: all 0.2s; }
    .demo-btn:hover { filter: brightness(1.3); transform: scale(1.02); }
    .code-wrap { white-space: pre-wrap; word-break: break-word; }
    .demo-box { border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem; background: #1e293b; transition: all 0.3s; }
    .bar { height: 24px; border-radius: 4px; transition: all 0.3s; display: inline-block; margin: 1px; }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 5px rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 15px rgba(99,102,241,0.6); } }
    .pulsing { animation: pulse-glow 1.5s ease-in-out infinite; }
    .phase-active { background: #3b82f6 !important; color: white !important; }
    .loading-spinner { border: 3px solid #1e293b; border-top: 3px solid #60a5fa; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 2rem auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeSlide 0.3s ease-out; }
    .proto-node { display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 50px; border-radius: 8px; margin: 4px; font-size: 0.65rem; font-weight: 600; flex-direction: column; }

      document.getElementById('debounce-count-' + qid).textContent = window.debounceCounts[qid];

        if (!window.debounceCalls[qid]) window.debounceCalls[qid] = 0;
        window.debounceCalls[qid]++;
        document.getElementById('debounce-calls-' + qid).textContent = window.debounceCalls[qid];

    window.throttleCalls = {};

      if (!window.throttleClicks[qid]) window.throttleClicks[qid] = 0;
      window.throttleClicks[qid]++;
      document.getElementById('throttle-clicks-' + qid).textContent = window.throttleClicks[qid];

      const state = window.throttleStates[qid] || { lastCall: 0 };
      const now = Date.now();
      if (now - state.lastCall >= 500) {
        state.lastCall = now;
        window.throttleStates[qid] = state;
        if (!window.throttleCalls[qid]) window.throttleCalls[qid] = 0;
        window.throttleCalls[qid]++;
        document.getElementById('throttle-calls-' + qid).textContent = window.throttleCalls[qid];
        const el = document.getElementById('demo-' + qid);
        if (el) el.textContent = '✅ Throttled call at ' + new Date().toLocaleTimeString() + '\n(At most once per 500ms)';
